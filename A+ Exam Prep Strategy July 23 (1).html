<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

.qz-root {
  --bg: #1E2229; --panel: #262B33; --panel-2: #2F3540; --hairline: #3A4150;
  --paper: #ECE6D6; --paper-2: #DDD4BC; --ink: #2A2520; --ink-dim: #6B645A;
  --copper: #C97A3D; --copper-soft: #E0A765; --resolved: #4F8B6B; --sla: #B5503D;
  --text: #D8D3C4; --text-dim: #8E8A7C;
  --mono: 'IBM Plex Mono', 'Courier New', monospace; --sans: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); font-family: var(--sans);
  border-radius: 12px; max-width: 620px; margin: 0 auto; border: 1px solid var(--hairline); overflow: hidden;
}
.qz-root * { box-sizing: border-box; }

.qz-header { padding: 18px 22px 14px; background: linear-gradient(180deg, var(--panel-2), var(--panel)); border-bottom: 1px solid var(--hairline); }
.qz-title { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--copper-soft); margin: 0 0 3px; }
.qz-subtitle { font-size: 13px; color: var(--text-dim); margin: 0; }

.qz-modetabs { display: flex; gap: 6px; margin-top: 12px; }
.qz-modetab { flex: 1; font-family: var(--mono); font-size: 11px; padding: 8px 10px; border-radius: 5px; border: 1px solid var(--hairline); background: var(--bg); color: var(--text-dim); cursor: pointer; text-align: center; }
.qz-modetab.active { border-color: var(--copper); color: var(--copper-soft); background: rgba(201,122,61,0.1); }

.qz-weekrow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.qz-weekchip { font-family: var(--mono); font-size: 11px; padding: 6px 11px; border-radius: 5px; border: 1px solid var(--hairline); background: var(--bg); color: var(--text-dim); cursor: pointer; }
.qz-weekchip:hover { color: var(--text); }
.qz-weekchip.active { border-color: var(--copper); color: var(--copper-soft); background: rgba(201,122,61,0.1); }
.qz-bestbadge { font-size: 9px; color: var(--resolved); margin-left: 4px; }

.qz-body { padding: 22px; background: var(--bg); }

/* Intro screen */
.qz-intro { text-align: center; padding: 10px 0 6px; }
.qz-intro-count { font-family: var(--mono); font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
.qz-intro-detail { font-size: 12px; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; max-width: 420px; margin-left: auto; margin-right: auto; }
.qz-start-btn { font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 6px; border: none; background: var(--copper); color: #fff; cursor: pointer; }
.qz-start-btn:hover { background: var(--copper-soft); }
.qz-domainkey { display: flex; flex-direction: column; gap: 5px; max-width: 280px; margin: 16px auto 0; text-align: left; }
.qz-domainkey-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.qz-domainkey-row b { color: var(--text); }

/* Quiz in progress */
.qz-progressrow { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.qz-timer { font-family: var(--mono); font-weight: 700; }
.qz-timer.low { color: var(--sla); animation: qz-blink 1s ease-in-out infinite; }
@keyframes qz-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@media (prefers-reduced-motion: reduce) { .qz-timer.low { animation: none; } }
.qz-progress-track { height: 6px; border-radius: 4px; background: var(--panel); border: 1px solid var(--hairline); overflow: hidden; margin-bottom: 14px; }
.qz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--copper), var(--resolved)); transition: width 0.3s ease; }

.qz-domaintag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--copper); margin-bottom: 8px; }

.qz-card { background: var(--paper); color: var(--ink); border-radius: 6px; padding: 18px 18px 14px; box-shadow: 0 8px 18px -8px rgba(0,0,0,0.5); }
.qz-qtext { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; }

.qz-opts { list-style: none; margin: 0 0 16px; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.qz-opt { border: 1.5px solid var(--paper-2); border-radius: 5px; padding: 11px 13px; font-size: 13.5px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; background: #F4EFE2; }
.qz-opt:hover { border-color: var(--copper); }
.qz-opt.selected { border-color: var(--copper); background: rgba(201,122,61,0.12); }
.qz-opt.correct-reveal { border-color: var(--resolved); background: rgba(79,139,107,0.18); }
.qz-opt.wrong-reveal { border-color: var(--sla); background: rgba(181,80,61,0.14); }
.qz-opt-letter { font-family: var(--mono); font-weight: 700; color: var(--copper); flex-shrink: 0; }
.qz-opt.correct-reveal .qz-opt-letter { color: var(--resolved); }
.qz-opt.wrong-reveal .qz-opt-letter { color: var(--sla); }

.qz-submit-btn { width: 100%; padding: 11px; border-radius: 5px; border: none; background: var(--copper); color: #fff; font-family: var(--mono); font-size: 13px; font-weight: 600; cursor: pointer; }
.qz-submit-btn:hover { background: var(--copper-soft); }
.qz-submit-btn:disabled { opacity: 0.35; cursor: default; }

.qz-feedback { font-size: 12.5px; padding: 11px 13px; border-radius: 5px; margin-top: 4px; margin-bottom: 12px; line-height: 1.45; }
.qz-feedback.right { background: rgba(79,139,107,0.15); color: #2F5440; border: 1px solid var(--resolved); }
.qz-feedback.wrong { background: rgba(181,80,61,0.12); color: #6E3527; border: 1px solid var(--sla); }
.qz-feedback b { font-family: var(--mono); }

.qz-next-btn { width: 100%; padding: 11px; border-radius: 5px; border: none; background: var(--resolved); color: #fff; font-family: var(--mono); font-size: 13px; font-weight: 600; cursor: pointer; }
.qz-next-btn:hover { opacity: 0.9; }

.qz-navrow { display: flex; gap: 8px; margin-top: 14px; }
.qz-navbtn { flex: 1; font-family: var(--mono); font-size: 11.5px; padding: 9px; border-radius: 5px; border: 1px solid var(--hairline); background: var(--panel); color: var(--text); cursor: pointer; }
.qz-navbtn:hover { border-color: var(--copper-soft); }
.qz-navbtn:disabled { opacity: 0.3; cursor: default; }
.qz-navbtn.submit { background: var(--sla); border-color: var(--sla); color: #fff; }

/* Review grid */
.qz-reviewgrid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 14px; }
.qz-gridbtn { font-family: var(--mono); font-size: 10px; padding: 6px 0; border-radius: 4px; border: 1px solid var(--hairline); background: var(--panel); color: var(--text-dim); cursor: pointer; }
.qz-gridbtn.answered { border-color: var(--resolved); color: var(--resolved-soft, var(--resolved)); background: rgba(79,139,107,0.12); }
.qz-gridbtn.current { border-color: var(--copper); color: var(--copper-soft); }

/* Results screen */
.qz-results { text-align: center; padding: 10px 0; }
.qz-score-big { font-family: var(--mono); font-size: 44px; font-weight: 700; color: var(--copper-soft); line-height: 1; }
.qz-score-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; }
.qz-passfail { display: inline-block; margin-top: 10px; padding: 5px 14px; border-radius: 20px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
.qz-passfail.pass { background: rgba(79,139,107,0.18); color: var(--resolved); border: 1px solid var(--resolved); }
.qz-passfail.fail { background: rgba(181,80,61,0.15); color: var(--sla); border: 1px solid var(--sla); }
.qz-disclaimer { font-size: 10.5px; color: var(--text-dim); margin-top: 8px; font-style: italic; }
.qz-score-msg { margin: 16px 0; font-size: 13.5px; color: var(--text); line-height: 1.5; }
.qz-best-row { font-family: var(--mono); font-size: 11px; color: var(--resolved); margin-bottom: 18px; }
.qz-retake-btn { font-family: var(--mono); font-size: 13px; font-weight: 600; padding: 11px 24px; border-radius: 6px; border: 1px solid var(--copper); background: transparent; color: var(--copper-soft); cursor: pointer; }
.qz-retake-btn:hover { background: rgba(201,122,61,0.1); }

.qz-domainbreak { margin-top: 22px; text-align: left; }
.qz-domainbreak-title { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
.qz-dbrow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.qz-dbname { width: 150px; flex-shrink: 0; color: var(--text-dim); }
.qz-dbtrack { flex: 1; height: 7px; background: var(--panel); border-radius: 4px; overflow: hidden; }
.qz-dbfill { height: 100%; }
.qz-dbfill.ok { background: var(--resolved); }
.qz-dbfill.miss { background: var(--sla); }
.qz-dbcount { font-family: var(--mono); width: 42px; text-align: right; color: var(--text-dim); }

.qz-objareas { margin-top: 18px; text-align: left; background: var(--panel); border-left: 3px solid var(--sla); border-radius: 0 4px 4px 0; padding: 12px 14px; }
.qz-objareas-title { font-family: var(--mono); font-size: 11px; color: var(--sla); margin-bottom: 6px; }
.qz-objareas ul { margin: 0; padding-left: 18px; font-size: 12.5px; line-height: 1.6; }

.qz-missed { margin-top: 22px; text-align: left; }
.qz-missed-title { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sla); margin-bottom: 8px; }
.qz-missed-item { background: var(--panel); border-left: 3px solid var(--sla); border-radius: 0 4px 4px 0; padding: 9px 11px; margin-bottom: 6px; font-size: 12px; line-height: 1.45; }
.qz-missed-item b { color: var(--text); }
</style>

<div class="qz-root">
  <div class="qz-header">
    <p class="qz-title">A+ Practice Exam Terminal</p>
    <p class="qz-subtitle">Core 1 — built from the videos you sent.</p>
    <div class="qz-modetabs" id="qz-modetabs"></div>
    <div class="qz-weekrow" id="qz-weekrow"></div>
  </div>
  <div class="qz-body" id="qz-body"></div>
</div>

<script>
(function() {
  const self = document.querySelector('.qz-root');

  const QUIZ = [
    {id:1, week:1, q:'What port does HTTPS use?', opts:['443', '80', '21', '3389'], correct:0, exp:'HTTPS uses TCP port 443. Port 80 is plain HTTP.'},
    {id:2, week:1, q:'Which protocol is connection-oriented and guarantees delivery?', opts:['TCP', 'UDP', 'ARP', 'ICMP'], correct:0, exp:'TCP sets up a connection and confirms delivery with acknowledgments. UDP is connectionless and does not guarantee delivery.'},
    {id:3, week:1, q:'What is the APIPA address range?', opts:['169.254.0.0–169.254.255.255', '192.168.0.0–192.168.255.255', '10.0.0.0–10.255.255.255', '127.0.0.0–127.255.255.255'], correct:0, exp:'APIPA addresses are self-assigned when a device cannot reach a DHCP server, and always fall in the 169.254.x.x range.'},
    {id:4, week:1, q:'A device sends a DHCP Discover message. What source IP and port does it use?', opts:['UDP port 68 from 0.0.0.0', 'TCP port 80 from its assigned IP', 'UDP port 53 from 127.0.0.1', 'TCP port 443 from the gateway'], correct:0, exp:'The client has no IP yet, so it broadcasts from 0.0.0.0 over UDP port 68 — the first D in DORA.'},
    {id:5, week:1, q:'What does a CNAME DNS record do?', opts:['Points an alias hostname to another (canonical) hostname', 'Maps a hostname to an IPv4 address', 'Specifies which server handles email for a domain', 'Lists which mail servers are authorized to send'], correct:0, exp:'A record does the IPv4 mapping, MX specifies mail servers, and SPF lists authorized senders — CNAME just aliases one name to another.'},
    {id:6, week:1, q:'Which port does DNS use?', opts:['53', '80', '443', '389'], correct:0, exp:'DNS commonly uses port 53, mostly over UDP.'},
    {id:7, week:1, q:"What's the purpose of a VPN concentrator?", opts:['Encrypts and decrypts VPN traffic', 'Assigns IP addresses to new devices', 'Filters incoming spam email', 'Distributes traffic across multiple servers'], correct:0, exp:'The concentrator (often built into a firewall) is the device responsible for the encryption/decryption work in a VPN.'},
    {id:8, week:1, q:'What is NFC primarily used for?', opts:['Short-range tap interactions like contactless payments', 'Long-range file transfer over Wi-Fi', 'Controlling radio tower frequencies', 'A type of fiber optic connector'], correct:0, exp:'NFC is a very short-range technology, commonly used for tap-to-pay and quick device-to-device transfers.'},
    {id:9, week:1, q:"What's the typical maximum range of Bluetooth for consumer devices?", opts:['About 10 meters', 'About 100 meters', 'About 1 kilometer', 'Effectively unlimited with repeaters'], correct:0, exp:'Consumer-grade Bluetooth (Class 2) tops out around 10 meters.'},
    {id:10, week:1, q:'A network switch forwards traffic based on what?', opts:['Destination MAC address', 'Destination IP address', 'TCP port number', 'Subnet mask'], correct:0, exp:'Switches operate using MAC addresses; routers use IP addresses to make their forwarding decisions.'},
    {id:11, week:1, q:'What is the well-known TCP/UDP port range?', opts:['0–1023', '1024–49151', '49152–65535', '0–65535'], correct:0, exp:'0–1023 is the well-known (non-ephemeral) range, where fixed services like HTTP and DNS live.'},
    {id:12, week:1, q:'What does DORA stand for in the DHCP process?', opts:['Discover, Offer, Request, Acknowledge', 'Detect, Open, Reply, Authorize', 'Discover, Open, Request, Authenticate', 'Define, Offer, Receive, Acknowledge'], correct:0, exp:'DORA is the four-step process a client and DHCP server go through to assign an IP address.'},
    {id:13, week:1, q:"What's the key difference between a managed and an unmanaged switch?", opts:['Managed supports VLANs, QoS, and SNMP; unmanaged does not', 'Unmanaged switches are always faster', 'Managed switches have no configuration options', 'They function identically'], correct:0, exp:'Unmanaged switches are plug-and-play with no configuration; managed switches add VLANs, prioritization, redundancy, and remote management.'},
    {id:14, week:1, q:'A phone shares its cellular connection with several other devices at once. What is this called?', opts:['A hotspot', 'Tethering', 'Bridging', 'Multiplexing'], correct:0, exp:'Tethering is one device connecting through the phone; a hotspot serves multiple devices at once.'},
    {id:15, week:1, q:'Which two ports does FTP commonly use?', opts:['20 and 21', '80 and 443', '67 and 68', '137 and 139'], correct:0, exp:'FTP uses port 20 for active data transfer and port 21 for control/administration.'},
    {id:16, week:2, q:'Which LCD panel type has the fastest response time but weak off-angle color?', opts:['TN', 'IPS', 'VA', 'OLED'], correct:0, exp:'TN (Twisted Nematic) is fast — good for gaming — but color shifts badly when viewed off-angle.'},
    {id:17, week:2, q:"What's actually different between T568A and T568B wiring?", opts:['Pins 1&2 and 3&6 (the orange and green pairs swap)', 'Pins 4 and 5 only', 'All 8 pins are different', 'Nothing — they are identical'], correct:0, exp:'Only the orange and green pairs swap position; the blue (4,5) and brown (7,8) pairs are the same in both standards.'},
    {id:18, week:2, q:"What's the minimum cable category for Gigabit Ethernet (1000BASE-T)?", opts:['Category 5e', 'Category 5', 'Category 3', 'Category 6a'], correct:0, exp:'Cat5e is the minimum standard for 1000BASE-T over 100 meters.'},
    {id:19, week:2, q:'Which fiber type uses laser light for long-distance transmission?', opts:['Single-mode', 'Multimode', 'Both equally', 'Neither'], correct:0, exp:'Single-mode fiber has a narrow core and uses laser light for long distances; multimode uses cheaper LED light over shorter runs.'},
    {id:20, week:2, q:"What is USB 3.0's maximum speed?", opts:['5Gbps', '480Mbps', '12Mbps', '10Gbps'], correct:0, exp:'USB 3.0 ("SuperSpeed") tops out at 5Gbps. 480Mbps is USB 2.0, and 10Gbps is USB 3.1.'},
    {id:21, week:2, q:'Which video connector is analog-only and carries no audio?', opts:['VGA', 'HDMI', 'DisplayPort', 'USB-C'], correct:0, exp:'VGA, like DVI, is video-only and analog. HDMI and DisplayPort both carry digital audio and video.'},
    {id:22, week:2, q:'Which RAID level needs at least 3 drives and can survive losing 1 of them?', opts:['RAID 5', 'RAID 0', 'RAID 1', 'RAID 10'], correct:0, exp:"RAID 5 stripes data with the equivalent of one drive's worth of parity, needing 3+ drives and surviving 1 failure."},
    {id:23, week:2, q:"What's the main benefit of NVMe over a SATA SSD?", opts:['It connects directly to the PCIe bus for much higher throughput', 'It uses less electrical power, nothing else', 'It is simply cheaper to manufacture', 'It has no moving parts, unlike a SATA SSD'], correct:0, exp:"Both NVMe and SATA SSDs lack moving parts — the real difference is NVMe bypassing SATA's bandwidth ceiling by connecting straight to PCIe."},
    {id:24, week:2, q:'Of ATX, Micro-ATX, and Mini-ITX, which is the smallest?', opts:['Mini-ITX', 'ATX', 'Micro-ATX', 'It depends on the manufacturer'], correct:0, exp:'ATX is largest, Micro-ATX is in the middle, and Mini-ITX is the smallest of the three.'},
    {id:25, week:2, q:"What's the core difference between PCI and PCIe?", opts:['PCIe is serial and faster; PCI is an older parallel bus', 'PCI is the newer standard', 'They are the exact same bus technology', 'PCIe only works with graphics cards'], correct:0, exp:'PCI communicates over a parallel bus; PCIe is serial, using one or more high-speed lanes.'},
    {id:26, week:2, q:'What does POST check at startup?', opts:['That core hardware like the CPU, memory, and keyboard/mouse are present', 'Internet connectivity', 'Hard drive partition health', 'Which applications are installed'], correct:0, exp:'POST (Power-On Self-Test) verifies the core hardware needed to even begin loading an OS.'},
    {id:27, week:2, q:"What's the key difference between legacy BIOS and UEFI?", opts:['UEFI is graphical and mouse-capable; legacy BIOS is older and text-based', 'Legacy BIOS is the newer standard', 'They are functionally identical', 'UEFI only works on AMD systems'], correct:0, exp:'UEFI is the modern, standardized, graphical replacement for the older text-based legacy BIOS.'},
    {id:28, week:2, q:'What does a TPM store?', opts:['Encryption keys tied to one specific physical device', 'A full copy of the operating system', 'Network passwords in plaintext', 'Printer driver files'], correct:0, exp:"A TPM securely holds cryptographic keys unique to that exact piece of hardware — that's why you can't just move an encrypted drive to another PC and read it."},
    {id:29, week:2, q:"What's the practical RAM ceiling for a 32-bit operating system?", opts:['About 4GB', 'About 8GB', 'About 16GB', 'Effectively unlimited'], correct:0, exp:'A 32-bit address space can reference 2^32 locations, which works out to about 4GB.'},
    {id:30, week:2, q:"What's the formula for calculating watts from volts and amps?", opts:['Watts = Volts × Amps', 'Watts = Volts ÷ Amps', 'Watts = Volts + Amps', 'Watts = Amps ÷ Volts'], correct:0, exp:'Power (watts) is voltage multiplied by current (amps).'},
    {id:31, week:3, q:'Where does a Type 1 hypervisor run?', opts:['Directly on the hardware (bare-metal)', 'On top of a host operating system', 'Only inside a public cloud', 'Only on macOS'], correct:0, exp:'Type 1 hypervisors (like VMware ESXi or Hyper-V) run with no host OS underneath; Type 2 hypervisors run on top of one.'},
    {id:32, week:3, q:'In a SaaS deployment, who manages the application itself?', opts:['The cloud provider, entirely', 'The customer, entirely', 'Always a 50/50 split', "No one — it's fully automated"], correct:0, exp:'SaaS means the provider manages everything: infrastructure, platform, and the application. The customer just logs in and uses it.'},
    {id:33, week:3, q:'What does cloud "elasticity" mean?', opts:['The ability to scale resources up or down on demand', 'A type of data encryption', 'A backup retention policy', 'A network topology'], correct:0, exp:'Elasticity is the ability to instantly add or remove resources as demand changes.'},
    {id:34, week:3, q:'Where can you look up a specific Windows BSoD stop code?', opts:['windows.com/stopcode', 'google.com/bsod', 'microsoft.com/help', 'support.com'], correct:0, exp:'Microsoft provides a dedicated stop-code lookup page at windows.com/stopcode.'},
    {id:35, week:3, q:'A loud clicking noise from a hard drive usually means what?', opts:['Likely unrecoverable physical failure', 'Normal spin-up behavior', 'Low battery', 'A pending software update'], correct:0, exp:'This is sometimes called the "click of death" — a serious mechanical failure sign.'},
    {id:36, week:3, q:'Roughly how do SSD and HDD IOPS compare?', opts:['SSD ~1,000,000 vs HDD ~200', 'They are roughly equal', 'HDD is faster', "SSDs don't have an IOPS rating"], correct:0, exp:'SSDs vastly outperform HDDs in IOPS — about 1 million vs around 200 — which is why swapping an HDD for an SSD is such a noticeable upgrade.'},
    {id:37, week:3, q:'What does "jitter" measure on a network?', opts:['Variation in timing between received data frames', 'Total available bandwidth', 'Wireless signal strength', 'The number of dropped packets'], correct:0, exp:"Jitter is inconsistency in arrival timing — a big problem for real-time voice and video."},
    {id:38, week:3, q:'What does "port flapping" describe?', opts:['A link repeatedly going up and down', 'A printer paper jam', 'A virtual machine crashing', 'A change to a firewall rule'], correct:0, exp:'Port flapping usually points to a bad cable or a failing switch port.'},
    {id:39, week:3, q:"What's the first thing to check when a monitor shows \"no signal\"?", opts:['The cable connection and the selected input source', 'Whether the GPU needs replacing', 'Whether Windows needs reinstalling', 'Whether the BIOS needs updating'], correct:0, exp:'Most "no signal" issues come down to a loose cable or the wrong input selected on the monitor.'},
    {id:40, week:3, q:'How do you fix a dead pixel?', opts:["You generally can't — the display needs to be replaced", 'Restart the computer', 'Update the graphics driver', 'Clean the screen with a cloth'], correct:0, exp:'A dead pixel is a permanent hardware defect and cannot be repaired through software.'},
    {id:41, week:3, q:"What's the correct order for baseline network troubleshooting?", opts:['Link light, then loopback ping, then local IP, then gateway, then an external address', "Order doesn't matter", 'Always ping an external address first', 'Only check the default gateway'], correct:0, exp:'Working outward from the device itself isolates exactly where the problem starts.'},
    {id:42, week:3, q:'Garbled printed output most likely points to what?', opts:['A wrong or mismatched printer driver, or the wrong page description language', 'Low ink only', 'A loose network cable', 'A virus on the print server'], correct:0, exp:'Garbled output is a classic symptom of sending PCL to a printer expecting PostScript (or vice versa), or using the wrong driver.'},
    {id:43, week:3, q:'What is a "VM escape"?', opts:['Malware breaking out of one VM to reach others through the hypervisor', 'Properly shutting down a VM', 'Migrating a VM to new hardware', 'Permanently deleting a VM'], correct:0, exp:'A VM escape is a serious hypervisor security flaw — rare in practice, but exactly what hypervisor vendors design against.'},
    {id:44, week:3, q:"What's the core tradeoff between public and private cloud?", opts:['Public: low upfront cost but shared/multi-tenant; Private: high upfront cost but fully dedicated', 'They cost exactly the same', 'Private cloud is always cheaper overall', 'Public clouds offer no security at all'], correct:0, exp:'Private cloud requires you to buy and run your own infrastructure; public cloud trades that upfront cost for a shared, pay-as-you-go model.'},
    {id:45, week:3, q:'What does S.M.A.R.T. do for a storage drive?', opts:['Tracks health statistics to help predict failure in advance', 'Encrypts the entire drive', 'Speeds up read/write operations', 'Compresses stored data automatically'], correct:0, exp:'S.M.A.R.T. monitors things like power-on hours and temperature to give early warning before a drive actually fails.'},
  ];

const FULL_EXAM = [
    {id:1, domain:'Mobile Devices', q:'What is NFC primarily used for?', opts:['Short-range tap interactions like contactless payments', 'Long-range file transfer over Wi-Fi', 'Controlling radio tower frequencies', 'A type of fiber optic connector'], correct:0, exp:'NFC is a very short-range technology, commonly used for tap-to-pay and quick device-to-device transfers.'},
    {id:2, domain:'Mobile Devices', q:'What\'s the typical maximum range of Bluetooth for consumer devices?', opts:['About 10 meters', 'About 100 meters', 'About 1 kilometer', 'Effectively unlimited with repeaters'], correct:0, exp:'Consumer-grade Bluetooth (Class 2) tops out around 10 meters.'},
    {id:3, domain:'Mobile Devices', q:'A phone shares its cellular connection with several other devices at once. What is this called?', opts:['A hotspot', 'Tethering', 'Bridging', 'Multiplexing'], correct:0, exp:'Tethering is one device connecting through the phone; a hotspot serves multiple devices at once.'},
    {id:4, domain:'Mobile Devices', q:'An employee uses their own personal phone for work, enrolled in company policy. What is this arrangement called?', opts:['BYOD', 'COPE', 'CYOD', 'MDM'], correct:0, exp:'BYOD (Bring Your Own Device) means the employee owns the device. COPE is when the company owns it.'},
    {id:5, domain:'Mobile Devices', q:'What does CYOD mean?', opts:['Choose Your Own Device — picking from a company-approved list', 'Corporate Owned, Your Device', 'Choose Your Own Data plan', 'Customer Yields Own Device'], correct:0, exp:'CYOD lets an employee select from a curated list of company-approved devices.'},
    {id:6, domain:'Mobile Devices', q:'A company wants to remotely wipe lost phones and enforce screen-lock policy across all employee devices. What tool provides this?', opts:['MDM', 'A VPN concentrator', 'A SIEM', 'A RAID controller'], correct:0, exp:'Mobile Device Management (MDM) centrally manages security policy across an organization\'s mobile devices.'},
    {id:7, domain:'Mobile Devices', q:'How does an eSIM differ from a physical SIM?', opts:['It\'s built into the device and transferred electronically, not physically swapped', 'It only works on Android devices', 'It has no phone number', 'It can\'t store any contacts'], correct:0, exp:'An eSIM is embedded in the hardware; moving it to another device is done in software, not by physically removing a card.'},
    {id:8, domain:'Mobile Devices', q:'How many satellites does a GPS receiver typically need to see for an accurate position fix?', opts:['At least 4', 'Exactly 1', 'At least 10', 'Exactly 2'], correct:0, exp:'GPS needs at least 4 visible satellites to calculate longitude, latitude, and altitude accurately.'},
    {id:9, domain:'Mobile Devices', q:'What\'s the difference between Bluetooth tethering and a mobile hotspot?', opts:['Tethering connects one device; a hotspot allows multiple devices to connect', 'They are identical in every way', 'A hotspot only works over a USB cable', 'Tethering requires a Wi-Fi network already'], correct:0, exp:'Tethering is a single device sharing the connection; a hotspot serves multiple devices simultaneously.'},
    {id:10, domain:'Mobile Devices', q:'A user wants to use a stylus on their iPad. What should they check first?', opts:['That the stylus is compatible with that specific tablet (e.g. Apple Pencil)', 'That the stylus uses a USB-C cable', 'That the stylus has a SIM slot', 'Nothing — all styluses work on all devices'], correct:0, exp:'Stylus compatibility (and the resulting pressure sensitivity/features) depends on matching the stylus to the specific device.'},
    {id:11, domain:'Mobile Devices', q:'What technology lets a phone place a call over a Wi-Fi network when cellular signal is weak?', opts:['Wi-Fi calling', 'Tethering', 'NFC', 'Bluetooth pairing'], correct:0, exp:'Wi-Fi calling routes voice calls over the local 802.11 network instead of the cellular network.'},
    {id:12, domain:'Mobile Devices', q:'What\'s an advantage of a docking station over a port replicator?', opts:['A docking station often supports full-size adapter cards; a port replicator does not', 'A docking station is more portable', 'They are functionally identical', 'A port replicator supports more monitors'], correct:0, exp:'Docking stations can be larger and support full adapter cards; port replicators trade that for portability and broader laptop compatibility.'},
    {id:13, domain:'Networking', q:'What port does HTTPS use?', opts:['443', '80', '21', '3389'], correct:0, exp:'HTTPS uses TCP port 443. Port 80 is plain HTTP.'},
    {id:14, domain:'Networking', q:'Which protocol is connection-oriented and guarantees delivery?', opts:['TCP', 'UDP', 'ARP', 'ICMP'], correct:0, exp:'TCP sets up a connection and confirms delivery with acknowledgments. UDP is connectionless and does not guarantee delivery.'},
    {id:15, domain:'Networking', q:'What is the APIPA address range?', opts:['169.254.0.0–169.254.255.255', '192.168.0.0–192.168.255.255', '10.0.0.0–10.255.255.255', '127.0.0.0–127.255.255.255'], correct:0, exp:'APIPA addresses are self-assigned when a device cannot reach a DHCP server, and always fall in the 169.254.x.x range.'},
    {id:16, domain:'Networking', q:'A device sends a DHCP Discover message. What source IP and port does it use?', opts:['UDP port 68 from 0.0.0.0', 'TCP port 80 from its assigned IP', 'UDP port 53 from 127.0.0.1', 'TCP port 443 from the gateway'], correct:0, exp:'The client has no IP yet, so it broadcasts from 0.0.0.0 over UDP port 68 — the first D in DORA.'},
    {id:17, domain:'Networking', q:'What does a CNAME DNS record do?', opts:['Points an alias hostname to another (canonical) hostname', 'Maps a hostname to an IPv4 address', 'Specifies which server handles email for a domain', 'Lists which mail servers are authorized to send'], correct:0, exp:'A record does the IPv4 mapping, MX specifies mail servers, and SPF lists authorized senders — CNAME just aliases one name to another.'},
    {id:18, domain:'Networking', q:'Which port does DNS use?', opts:['53', '80', '443', '389'], correct:0, exp:'DNS commonly uses port 53, mostly over UDP.'},
    {id:19, domain:'Networking', q:'What\'s the purpose of a VPN concentrator?', opts:['Encrypts and decrypts VPN traffic', 'Assigns IP addresses to new devices', 'Filters incoming spam email', 'Distributes traffic across multiple servers'], correct:0, exp:'The concentrator (often built into a firewall) is the device responsible for the encryption/decryption work in a VPN.'},
    {id:20, domain:'Networking', q:'A network switch forwards traffic based on what?', opts:['Destination MAC address', 'Destination IP address', 'TCP port number', 'Subnet mask'], correct:0, exp:'Switches operate using MAC addresses; routers use IP addresses to make their forwarding decisions.'},
    {id:21, domain:'Networking', q:'What is the well-known TCP/UDP port range?', opts:['0–1023', '1024–49151', '49152–65535', '0–65535'], correct:0, exp:'0–1023 is the well-known (non-ephemeral) range, where fixed services like HTTP and DNS live.'},
    {id:22, domain:'Networking', q:'What does DORA stand for in the DHCP process?', opts:['Discover, Offer, Request, Acknowledge', 'Detect, Open, Reply, Authorize', 'Discover, Open, Request, Authenticate', 'Define, Offer, Receive, Acknowledge'], correct:0, exp:'DORA is the four-step process a client and DHCP server go through to assign an IP address.'},
    {id:23, domain:'Networking', q:'What\'s the key difference between a managed and an unmanaged switch?', opts:['Managed supports VLANs, QoS, and SNMP; unmanaged does not', 'Unmanaged switches are always faster', 'Managed switches have no configuration options', 'They function identically'], correct:0, exp:'Unmanaged switches are plug-and-play with no configuration; managed switches add VLANs, prioritization, redundancy, and remote management.'},
    {id:24, domain:'Networking', q:'Which two ports does FTP commonly use?', opts:['20 and 21', '80 and 443', '67 and 68', '137 and 139'], correct:0, exp:'FTP uses port 20 for active data transfer and port 21 for control/administration.'},
    {id:25, domain:'Networking', q:'What\'s the purpose of NAT?', opts:['Lets many private IP addresses share a small number of public addresses', 'Encrypts all network traffic', 'Assigns MAC addresses to devices', 'Filters spam email'], correct:0, exp:'Network Address Translation lets a large private network share a much smaller pool of public IP addresses.'},
    {id:26, domain:'Networking', q:'Which DNS record type lists which mail servers are authorized to send email for a domain?', opts:['SPF', 'A', 'CNAME', 'AAAA'], correct:0, exp:'An SPF record is a TXT record listing authorized outgoing mail servers, used to fight spoofing.'},
    {id:27, domain:'Networking', q:'What is a DHCP scope?', opts:['The pool of addresses and settings defined for a subnet', 'A type of firewall rule', 'A VLAN tag', 'A type of VPN'], correct:0, exp:'A DHCP scope defines the address pool, subnet mask, gateway, and other settings handed out to that subnet.'},
    {id:28, domain:'Networking', q:'Two physically separate switches need to act as one device, while still keeping connected devices in separate broadcast domains. What feature solves this?', opts:['VLANs', 'NAT', 'RAID', 'DORA'], correct:0, exp:'VLANs let a single physical switch be logically split into multiple separate broadcast domains.'},
    {id:29, domain:'Networking', q:'What\'s a key difference between a traditional firewall and a next-generation firewall?', opts:['Traditional filters by port number; next-gen filters by the actual application', 'Traditional firewalls are always faster', 'Next-gen firewalls have no rules at all', 'They are functionally identical'], correct:0, exp:'Traditional firewalls inspect port numbers; next-gen firewalls can identify and filter based on the specific application generating the traffic.'},
    {id:30, domain:'Networking', q:'Roughly how many total IPv4 addresses are possible?', opts:['About 4.29 billion', 'About 4.29 trillion', 'Exactly 65,536', 'Unlimited'], correct:0, exp:'A 32-bit address space allows for about 4.29 billion unique combinations.'},
    {id:31, domain:'Networking', q:'A device can\'t reach a DHCP server and self-assigns an address starting with 169.254. What is this called?', opts:['APIPA', 'NAT', 'DORA', 'DOCSIS'], correct:0, exp:'APIPA (Automatic Private IP Addressing) is the fallback a device uses when DHCP is unreachable.'},
    {id:32, domain:'Networking', q:'What is the role of an ONT in a fiber internet installation?', opts:['Converts fiber to copper at the demarcation point', 'Encrypts VPN traffic', 'Distributes IP addresses to clients', 'Filters wireless interference'], correct:0, exp:'An Optical Network Terminal converts the incoming fiber signal to copper at the demarcation point.'},
    {id:33, domain:'Networking', q:'Which statement about a site-to-site VPN is true?', opts:['It connects two entire networks together via concentrators, often firewalls', 'It only ever connects a single remote user', 'It requires no encryption', 'It only works over satellite links'], correct:0, exp:'Site-to-site VPNs link two networks together, typically using firewalls acting as the VPN concentrators on each end.'},
    {id:34, domain:'Hardware', q:'Which LCD panel type has the fastest response time but weak off-angle color?', opts:['TN', 'IPS', 'VA', 'OLED'], correct:0, exp:'TN (Twisted Nematic) is fast — good for gaming — but color shifts badly when viewed off-angle.'},
    {id:35, domain:'Hardware', q:'What\'s actually different between T568A and T568B wiring?', opts:['Pins 1&2 and 3&6 (the orange and green pairs swap)', 'Pins 4 and 5 only', 'All 8 pins are different', 'Nothing — they are identical'], correct:0, exp:'Only the orange and green pairs swap position; the blue (4,5) and brown (7,8) pairs are the same in both standards.'},
    {id:36, domain:'Hardware', q:'What\'s the minimum cable category for Gigabit Ethernet (1000BASE-T)?', opts:['Category 5e', 'Category 5', 'Category 3', 'Category 6a'], correct:0, exp:'Cat5e is the minimum standard for 1000BASE-T over 100 meters.'},
    {id:37, domain:'Hardware', q:'Which fiber type uses laser light for long-distance transmission?', opts:['Single-mode', 'Multimode', 'Both equally', 'Neither'], correct:0, exp:'Single-mode fiber has a narrow core and uses laser light for long distances; multimode uses cheaper LED light over shorter runs.'},
    {id:38, domain:'Hardware', q:'What is USB 3.0\'s maximum speed?', opts:['5Gbps', '480Mbps', '12Mbps', '10Gbps'], correct:0, exp:'USB 3.0 ("SuperSpeed") tops out at 5Gbps. 480Mbps is USB 2.0, and 10Gbps is USB 3.1.'},
    {id:39, domain:'Hardware', q:'Which video connector is analog-only and carries no audio?', opts:['VGA', 'HDMI', 'DisplayPort', 'USB-C'], correct:0, exp:'VGA, like DVI, is video-only and analog. HDMI and DisplayPort both carry digital audio and video.'},
    {id:40, domain:'Hardware', q:'Which RAID level needs at least 3 drives and can survive losing 1 of them?', opts:['RAID 5', 'RAID 0', 'RAID 1', 'RAID 10'], correct:0, exp:'RAID 5 stripes data with the equivalent of one drive\'s worth of parity, needing 3+ drives and surviving 1 failure.'},
    {id:41, domain:'Hardware', q:'What\'s the main benefit of NVMe over a SATA SSD?', opts:['It connects directly to the PCIe bus for much higher throughput', 'It uses less electrical power, nothing else', 'It is simply cheaper to manufacture', 'It has no moving parts, unlike a SATA SSD'], correct:0, exp:'Both NVMe and SATA SSDs lack moving parts — the real difference is NVMe bypassing SATA\'s bandwidth ceiling by connecting straight to PCIe.'},
    {id:42, domain:'Hardware', q:'Of ATX, Micro-ATX, and Mini-ITX, which is the smallest?', opts:['Mini-ITX', 'ATX', 'Micro-ATX', 'It depends on the manufacturer'], correct:0, exp:'ATX is largest, Micro-ATX is in the middle, and Mini-ITX is the smallest of the three.'},
    {id:43, domain:'Hardware', q:'What\'s the core difference between PCI and PCIe?', opts:['PCIe is serial and faster; PCI is an older parallel bus', 'PCI is the newer standard', 'They are the exact same bus technology', 'PCIe only works with graphics cards'], correct:0, exp:'PCI communicates over a parallel bus; PCIe is serial, using one or more high-speed lanes.'},
    {id:44, domain:'Hardware', q:'What does POST check at startup?', opts:['That core hardware like the CPU, memory, and keyboard/mouse are present', 'Internet connectivity', 'Hard drive partition health', 'Which applications are installed'], correct:0, exp:'POST (Power-On Self-Test) verifies the core hardware needed to even begin loading an OS.'},
    {id:45, domain:'Hardware', q:'What\'s the key difference between legacy BIOS and UEFI?', opts:['UEFI is graphical and mouse-capable; legacy BIOS is older and text-based', 'Legacy BIOS is the newer standard', 'They are functionally identical', 'UEFI only works on AMD systems'], correct:0, exp:'UEFI is the modern, standardized, graphical replacement for the older text-based legacy BIOS.'},
    {id:46, domain:'Hardware', q:'What does a TPM store?', opts:['Encryption keys tied to one specific physical device', 'A full copy of the operating system', 'Network passwords in plaintext', 'Printer driver files'], correct:0, exp:'A TPM securely holds cryptographic keys unique to that exact piece of hardware.'},
    {id:47, domain:'Hardware', q:'What\'s the practical RAM ceiling for a 32-bit operating system?', opts:['About 4GB', 'About 8GB', 'About 16GB', 'Effectively unlimited'], correct:0, exp:'A 32-bit address space can reference 2^32 locations, which works out to about 4GB.'},
    {id:48, domain:'Hardware', q:'What\'s the formula for calculating watts from volts and amps?', opts:['Watts = Volts × Amps', 'Watts = Volts ÷ Amps', 'Watts = Volts + Amps', 'Watts = Amps ÷ Volts'], correct:0, exp:'Power (watts) is voltage multiplied by current (amps).'},
    {id:49, domain:'Hardware', q:'What\'s the minimum number of drives needed for RAID 6, and what can it survive?', opts:['4 drives, survives 2 failures', '2 drives, survives 1 failure', '3 drives, survives 1 failure', '6 drives, survives 3 failures'], correct:0, exp:'RAID 6 adds a second parity drive over RAID 5, requiring at least 4 drives and surviving 2 simultaneous failures.'},
    {id:50, domain:'Hardware', q:'What\'s the key advantage of ECC memory over standard parity memory?', opts:['ECC can detect AND correct errors; parity can only detect them', 'ECC is always cheaper', 'Parity memory is faster', 'They are functionally identical'], correct:0, exp:'Parity memory can only flag that an error occurred; ECC can actually fix single-bit errors on the fly.'},
    {id:51, domain:'Hardware', q:'What does the M.2 interface enable that older mSATA could not?', opts:['A direct connection to the PCIe bus, enabling NVMe speeds', 'Wireless connectivity', 'Hot-swap capability only', 'Nothing — they are the same technology'], correct:0, exp:'M.2 can carry NVMe signaling straight to the PCIe bus, far exceeding what mSATA (limited to SATA speeds) could offer.'},
    {id:52, domain:'Hardware', q:'A technician needs 10-Gigabit Ethernet over a full 100-meter unshielded run. What\'s the minimum cable category required?', opts:['Category 6a', 'Category 5e', 'Category 3', 'Category 6 unshielded'], correct:0, exp:'Unshielded Cat6 only reaches 55 meters at 10G; Cat6a is needed for the full 100 meters.'},
    {id:53, domain:'Hardware', q:'What\'s the purpose of a heat sink?', opts:['Increases surface area to help dissipate heat away from a hot component', 'Generates cooling air directly by itself', 'Stores backup electrical power', 'Filters electrical noise from a signal'], correct:0, exp:'A heat sink\'s fins increase surface area so airflow can carry heat away more efficiently.'},
    {id:54, domain:'Hardware', q:'What does the 80 Plus rating system measure on a power supply?', opts:['Energy efficiency — how little power is wasted as heat', 'Maximum wattage only', 'Fan noise level', 'Warranty length'], correct:0, exp:'80 Plus ratings (Bronze through Titanium) measure how efficiently a PSU converts AC to DC, with less waste as heat at higher tiers.'},
    {id:55, domain:'Hardware', q:'Why can\'t you mix DDR3 and DDR4 memory modules on the same motherboard?', opts:['They are physically keyed differently and are not compatible', 'They simply use different voltages, nothing else', 'DDR4 is a software-only upgrade', 'There is no real difference between them'], correct:0, exp:'Each DDR generation has a different physical notch/key, intentionally preventing installation in the wrong motherboard.'},
    {id:56, domain:'Hardware', q:'What is the purpose of a TPM\'s root of trust?', opts:['Ties cryptographic keys to one specific physical computer so they can\'t be moved elsewhere', 'Speeds up the CPU clock', 'Backs up files automatically every hour', 'Manages saved Wi-Fi passwords'], correct:0, exp:'This is exactly why an encrypted drive protected by a TPM can\'t simply be moved to another PC and decrypted.'},
    {id:57, domain:'Virtualization & Cloud', q:'Where does a Type 1 hypervisor run?', opts:['Directly on the hardware (bare-metal)', 'On top of a host operating system', 'Only inside a public cloud', 'Only on macOS'], correct:0, exp:'Type 1 hypervisors (like VMware ESXi or Hyper-V) run with no host OS underneath; Type 2 hypervisors run on top of one.'},
    {id:58, domain:'Virtualization & Cloud', q:'In a SaaS deployment, who manages the application itself?', opts:['The cloud provider, entirely', 'The customer, entirely', 'Always a 50/50 split', 'No one — it\'s fully automated'], correct:0, exp:'SaaS means the provider manages everything: infrastructure, platform, and the application. The customer just logs in and uses it.'},
    {id:59, domain:'Virtualization & Cloud', q:'What does cloud "elasticity" mean?', opts:['The ability to scale resources up or down on demand', 'A type of data encryption', 'A backup retention policy', 'A network topology'], correct:0, exp:'Elasticity is the ability to instantly add or remove resources as demand changes.'},
    {id:60, domain:'Virtualization & Cloud', q:'What is a "VM escape"?', opts:['Malware breaking out of one VM to reach others through the hypervisor', 'Properly shutting down a VM', 'Migrating a VM to new hardware', 'Permanently deleting a VM'], correct:0, exp:'A VM escape is a serious hypervisor security flaw — rare in practice, but exactly what hypervisor vendors design against.'},
    {id:61, domain:'Virtualization & Cloud', q:'What\'s the core tradeoff between public and private cloud?', opts:['Public: low upfront cost but shared/multi-tenant; Private: high upfront cost but fully dedicated', 'They cost exactly the same', 'Private cloud is always cheaper overall', 'Public clouds offer no security at all'], correct:0, exp:'Private cloud requires you to buy and run your own infrastructure; public cloud trades that upfront cost for a shared, pay-as-you-go model.'},
    {id:62, domain:'Virtualization & Cloud', q:'What\'s the difference between IaaS and PaaS?', opts:['IaaS rents infrastructure (you manage OS/apps); PaaS provides a platform to build apps (provider manages the platform)', 'They are identical deployment models', 'PaaS is hardware-only, with no software layer', 'IaaS requires no management from the customer at all'], correct:0, exp:'IaaS hands you raw infrastructure to manage yourself; PaaS gives you a ready-made platform so you only write the application.'},
    {id:63, domain:'Virtualization & Cloud', q:'What does "multi-tenancy" mean in cloud computing?', opts:['Many different customers share the same physical infrastructure, kept logically isolated', 'Only one customer is ever allowed per server', 'A specific backup strategy', 'A type of VPN connection'], correct:0, exp:'Multi-tenancy is how public clouds achieve efficiency — many customers sharing hardware while staying isolated from each other.'},
    {id:64, domain:'Virtualization & Cloud', q:'What\'s the benefit of a VM snapshot?', opts:['It lets you instantly revert to a saved state if something goes wrong', 'It permanently deletes the VM', 'It backs up the entire physical host', 'It encrypts the VM\'s virtual disk'], correct:0, exp:'Snapshots capture a VM\'s state at a point in time, so you can roll back quickly after a risky change.'},
    {id:65, domain:'Virtualization & Cloud', q:'How does application containerization (e.g. Docker) differ from full virtualization?', opts:['Containers share one host OS and virtualize only the application, making them much lighter', 'Containers each require their own full guest OS, just like a VM', 'They are exactly the same technology', 'Containers cannot run more than one application ever'], correct:0, exp:'Containers skip the overhead of a full guest OS by sharing the host OS kernel, making them far lighter than VMs.'},
    {id:66, domain:'Virtualization & Cloud', q:'What is VDI typically used for?', opts:['Running a full desktop OS remotely, so the local device only needs a keyboard, mouse, and display', 'Speeding up local gaming performance', 'Replacing all physical servers with a single VM', 'Encrypting local hard drives'], correct:0, exp:'Virtual Desktop Infrastructure runs the entire desktop experience remotely, minimizing what the local endpoint device needs to provide.'},
    {id:67, domain:'Troubleshooting', q:'Where can you look up a specific Windows BSoD stop code?', opts:['windows.com/stopcode', 'google.com/bsod', 'microsoft.com/help', 'support.com'], correct:0, exp:'Microsoft provides a dedicated stop-code lookup page at windows.com/stopcode.'},
    {id:68, domain:'Troubleshooting', q:'A loud clicking noise from a hard drive usually means what?', opts:['Likely unrecoverable physical failure', 'Normal spin-up behavior', 'Low battery', 'A pending software update'], correct:0, exp:'This is sometimes called the "click of death" — a serious mechanical failure sign.'},
    {id:69, domain:'Troubleshooting', q:'Roughly how do SSD and HDD IOPS compare?', opts:['SSD ~1,000,000 vs HDD ~200', 'They are roughly equal', 'HDD is faster', 'SSDs don\'t have an IOPS rating'], correct:0, exp:'SSDs vastly outperform HDDs in IOPS — about 1 million vs around 200 — which is why swapping an HDD for an SSD is such a noticeable upgrade.'},
    {id:70, domain:'Troubleshooting', q:'What does "jitter" measure on a network?', opts:['Variation in timing between received data frames', 'Total available bandwidth', 'Wireless signal strength', 'The number of dropped packets'], correct:0, exp:'Jitter is inconsistency in arrival timing — a big problem for real-time voice and video.'},
    {id:71, domain:'Troubleshooting', q:'What does "port flapping" describe?', opts:['A link repeatedly going up and down', 'A printer paper jam', 'A virtual machine crashing', 'A change to a firewall rule'], correct:0, exp:'Port flapping usually points to a bad cable or a failing switch port.'},
    {id:72, domain:'Troubleshooting', q:'What\'s the first thing to check when a monitor shows "no signal"?', opts:['The cable connection and the selected input source', 'Whether the GPU needs replacing', 'Whether Windows needs reinstalling', 'Whether the BIOS needs updating'], correct:0, exp:'Most "no signal" issues come down to a loose cable or the wrong input selected on the monitor.'},
    {id:73, domain:'Troubleshooting', q:'How do you fix a dead pixel?', opts:['You generally can\'t — the display needs to be replaced', 'Restart the computer', 'Update the graphics driver', 'Clean the screen with a cloth'], correct:0, exp:'A dead pixel is a permanent hardware defect and cannot be repaired through software.'},
    {id:74, domain:'Troubleshooting', q:'What\'s the correct order for baseline network troubleshooting?', opts:['Link light, then loopback ping, then local IP, then gateway, then an external address', 'Order doesn\'t matter', 'Always ping an external address first', 'Only check the default gateway'], correct:0, exp:'Working outward from the device itself isolates exactly where the problem starts.'},
    {id:75, domain:'Troubleshooting', q:'Garbled printed output most likely points to what?', opts:['A wrong or mismatched printer driver, or the wrong page description language', 'Low ink only', 'A loose network cable', 'A virus on the print server'], correct:0, exp:'Garbled output is a classic symptom of sending PCL to a printer expecting PostScript (or vice versa), or using the wrong driver.'},
    {id:76, domain:'Troubleshooting', q:'What does S.M.A.R.T. do for a storage drive?', opts:['Tracks health statistics to help predict failure in advance', 'Encrypts the entire drive', 'Speeds up read/write operations', 'Compresses stored data automatically'], correct:0, exp:'S.M.A.R.T. monitors things like power-on hours and temperature to give early warning before a drive actually fails.'},
    {id:77, domain:'Troubleshooting', q:'A computer beeps at startup with no video. What does this most likely indicate?', opts:['A POST failure — bad memory, CPU, or video', 'A failing hard drive', 'A printer driver issue', 'A Wi-Fi misconfiguration'], correct:0, exp:'Beeping with no display points to a core hardware issue caught during POST, before video even initializes.'},
    {id:78, domain:'Troubleshooting', q:'What\'s the correct response to a swollen, bulging phone battery?', opts:['Stop using the device immediately — it\'s a fire risk', 'Charge it fully right away', 'Puncture it to release the gas', 'Keep using it until it dies'], correct:0, exp:'A swollen battery is a genuine fire hazard and should never be charged, punctured, or used further.'},
    {id:79, domain:'Troubleshooting', q:'A laser printer\'s pages all show the same dark line running down them. What\'s the most likely cause?', opts:['A scratch on the photosensitive drum', 'A loose network cable', 'Low memory in the printer', 'A Wi-Fi signal issue'], correct:0, exp:'A consistent line down every page on a laser printer is the classic symptom of a scratched drum.'},
    {id:80, domain:'Troubleshooting', q:'What\'s the recommended first response to liquid spilled on a phone?', opts:['Power it off immediately and do not charge it', 'Charge it to dry the battery faster', 'Put it directly in a freezer', 'Turn it on to check if it still works'], correct:0, exp:'Powering off immediately and avoiding a charge prevents a short circuit while the device dries out.'},
    {id:81, domain:'Troubleshooting', q:'What does a "degraded" RAID array status typically mean?', opts:['One or more drives have failed, but the array is still running', 'The array has been completely lost', 'The array is running faster than normal', 'Nothing is wrong with the array'], correct:0, exp:'Degraded means redundancy has been reduced by a drive failure, but the array is still operational — for now.'},
    {id:82, domain:'Troubleshooting', q:'What\'s the recommended way to resolve a print queue stuck behind a frozen spooler?', opts:['Restart the print spooler service, then investigate the stuck job', 'Unplug the printer\'s power for 24 hours', 'Reinstall the entire operating system', 'Replace the printer'], correct:0, exp:'The print spooler is a Windows service that can be restarted directly — often resolving a stuck queue without any hardware changes.'},
    {id:83, domain:'Troubleshooting', q:'A wireless network has intermittent connectivity, with several other networks nearby. What should you try?', opts:['Changing the access point\'s channel or frequency to reduce interference', 'Replacing all of the network\'s cables', 'Disabling DHCP entirely', 'Reinstalling the operating system'], correct:0, exp:'Crowded channels are a common cause of wireless interference; switching channels often resolves it.'},
    {id:84, domain:'Troubleshooting', q:'What\'s the key difference between "drive not recognized" and "operating system not found"?', opts:['"Not recognized" means the drive isn\'t detected at all; "OS not found" means the drive IS seen but has no bootable file system', 'They mean exactly the same thing', '"OS not found" means the drive is physically destroyed', '"Not recognized" only happens with SSDs'], correct:0, exp:'These two messages point to very different root causes — one is a detection problem, the other is a missing/corrupt boot file system on an otherwise-detected drive.'},
    {id:85, domain:'Troubleshooting', q:'What is a common cause of "cursor drift" or phantom touches on a touchscreen?', opts:['A bad digitizer or display, not malware', 'Always a virus', 'A drained battery', 'An outdated app store'], correct:0, exp:'Phantom touch behavior is usually a hardware issue with the digitizer or display, not a security problem.'},
    {id:86, domain:'Troubleshooting', q:'A computer randomly shuts off with no warning message. What\'s a common cause?', opts:['An automatic thermal protection shutdown due to overheating', 'A printer driver conflict', 'A Wi-Fi outage', 'A monitor cable issue'], correct:0, exp:'Many systems automatically power down to protect components once internal temperature sensors detect dangerous heat.'},
    {id:87, domain:'Troubleshooting', q:'What should you do about a fake antivirus pop-up demanding payment?', opts:['Close it via Task Manager and scan with legitimate anti-malware software', 'Enter your credit card to make it stop', 'Restart into airplane mode', 'Ignore it and keep working as normal'], correct:0, exp:'Fake AV pop-ups are a social engineering tactic — close them safely and verify with trusted security software instead of engaging.'},
    {id:88, domain:'Troubleshooting', q:'A print job comes out with garbled, unreadable characters. What\'s the most likely cause?', opts:['A mismatched printer driver or wrong page description language (PCL vs PostScript)', 'The paper tray is empty', 'The Wi-Fi password changed', 'The toner is the wrong color'], correct:0, exp:'Garbled text is the signature symptom of a driver/PDL mismatch between what\'s sent and what the printer expects.'},
    {id:89, domain:'Troubleshooting', q:'What\'s the recommended first step before replacing a drive in a RAID array?', opts:['Confirm you\'re pulling the actual failed drive, not a healthy one', 'Immediately reformat the entire array', 'Disconnect all drives in the array at once', 'Update the motherboard BIOS first'], correct:0, exp:'In arrays with many identical-looking drives, double-checking which one actually failed prevents a costly mistake.'},
    {id:90, domain:'Troubleshooting', q:'What\'s a sensible first step when a system displays a Windows stop error repeatedly after a recent change?', opts:['Roll back the most recent driver or use System Restore', 'Immediately replace the motherboard', 'Reformat the drive without backing up', 'Ignore it — it will resolve itself'], correct:0, exp:'If the BSoD started after a recent driver or software change, undoing that change is the fastest path to isolating the cause.'},
  ];

  const WEEKS = [1,2,3];
  const DOMAINS = ['Mobile Devices', 'Networking', 'Hardware', 'Virtualization & Cloud', 'Troubleshooting'];
  const DOMAIN_PCT = {'Mobile Devices':13, 'Networking':23, 'Hardware':25, 'Virtualization & Cloud':11, 'Troubleshooting':28};

  let mode = 'week'; // 'week' | 'exam'
  let activeWeek = 1;
  let bestScores = {};
  let bestExamScore = null;
  let session = null;
  let examTimer = null;

  function pad(n){ return n<10?'0'+n:''+n; }
  function currentWeekByDate() {
    const t = new Date();
    const s = t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());
    if (s <= '2026-06-25') return 1;
    if (s <= '2026-07-02') return 2;
    return 3;
  }

  async function loadBest() {
    try { const res = await window.storage.get('aplus-quiz-best'); if (res && res.value) bestScores = JSON.parse(res.value); } catch(e) { bestScores = {}; }
    try { const res2 = await window.storage.get('aplus-exam-best'); if (res2 && res2.value) bestExamScore = JSON.parse(res2.value); } catch(e) { bestExamScore = null; }
  }
  async function saveBest() { try { await window.storage.set('aplus-quiz-best', JSON.stringify(bestScores)); } catch(e) {} }
  async function saveExamBest() { try { await window.storage.set('aplus-exam-best', JSON.stringify(bestExamScore)); } catch(e) {} }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  function renderModeTabs() {
    const row = self.querySelector('#qz-modetabs');
    row.innerHTML = '';
    const tabs = [['week','Quick Practice'], ['exam','Full Exam (90Q · 90 min)']];
    tabs.forEach(([key, label]) => {
      const btn = document.createElement('button');
      btn.className = 'qz-modetab' + (mode === key ? ' active' : '');
      btn.textContent = label;
      btn.addEventListener('click', () => { mode = key; session = null; clearExamTimer(); renderAll(); });
      row.appendChild(btn);
    });
  }

  function renderWeeks() {
    const row = self.querySelector('#qz-weekrow');
    row.innerHTML = '';
    if (mode !== 'week') return;
    WEEKS.forEach(w => {
      const chip = document.createElement('button');
      chip.className = 'qz-weekchip' + (activeWeek === w ? ' active' : '');
      const best = bestScores[w];
      chip.innerHTML = 'Week ' + w + (best !== undefined ? '<span class="qz-bestbadge">best ' + best + '%</span>' : '');
      chip.addEventListener('click', () => { activeWeek = w; session = null; renderAll(); });
      row.appendChild(chip);
    });
  }

  function renderAll() { renderModeTabs(); renderWeeks(); renderBody(); }

  // ---------------- WEEK QUIZ MODE ----------------
  function startWeekQuiz() {
    const pool = QUIZ.filter(q => q.week === activeWeek);
    session = { type:'week', order: shuffle(pool.map(q => q.id)), pos: 0, score: 0, answered: false, selected: null, finished: false, missed: [], optOrder: null };
    renderBody();
  }

  function renderWeekBody(body) {
    if (!session) {
      const count = QUIZ.filter(q => q.week === activeWeek).length;
      const intro = document.createElement('div');
      intro.className = 'qz-intro';
      intro.innerHTML = '<div class="qz-intro-count">' + count + ' questions · Week ' + activeWeek + '</div><button class="qz-start-btn">▶ Start Quiz</button>';
      intro.querySelector('button').addEventListener('click', startWeekQuiz);
      body.appendChild(intro);
      return;
    }
    if (session.finished) { renderWeekResults(body); return; }

    const total = session.order.length;
    const q = QUIZ.find(x => x.id === session.order[session.pos]);
    if (!session.optOrder) session.optOrder = shuffle(q.opts.map((_, i) => i));

    const progRow = document.createElement('div');
    progRow.className = 'qz-progressrow';
    progRow.innerHTML = '<span>QUESTION ' + (session.pos + 1) + ' OF ' + total + '</span><span>SCORE ' + session.score + '/' + session.pos + '</span>';
    body.appendChild(progRow);
    const track = document.createElement('div');
    track.className = 'qz-progress-track';
    track.innerHTML = '<div class="qz-progress-fill" style="width:' + Math.round((session.pos / total) * 100) + '%"></div>';
    body.appendChild(track);

    const card = document.createElement('div');
    card.className = 'qz-card';
    card.innerHTML = '<div class="qz-qtext">' + q.q + '</div>';
    const ul = document.createElement('ul');
    ul.className = 'qz-opts';
    const letters = ['A','B','C','D'];
    session.optOrder.forEach((origIdx, i) => {
      const li = document.createElement('li');
      li.className = 'qz-opt';
      li.innerHTML = '<span class="qz-opt-letter">' + letters[i] + '</span><span>' + q.opts[origIdx] + '</span>';
      li.dataset.origIdx = origIdx;
      if (!session.answered) {
        li.addEventListener('click', () => {
          ul.querySelectorAll('.qz-opt').forEach(el => el.classList.remove('selected'));
          li.classList.add('selected');
          session.selected = origIdx;
          submitBtn.disabled = false;
        });
      }
      ul.appendChild(li);
    });
    card.appendChild(ul);

    const submitBtn = document.createElement('button');
    submitBtn.className = 'qz-submit-btn';
    submitBtn.textContent = 'Submit Answer';
    submitBtn.disabled = session.selected === null;
    if (!session.answered) {
      submitBtn.addEventListener('click', () => {
        session.answered = true;
        const correct = session.selected === q.correct;
        if (correct) session.score++;
        else session.missed.push({ q: q.q, correctText: q.opts[q.correct], exp: q.exp });
        ul.querySelectorAll('.qz-opt').forEach(el => {
          const idx = parseInt(el.dataset.origIdx, 10);
          if (idx === q.correct) el.classList.add('correct-reveal');
          else if (idx === session.selected) el.classList.add('wrong-reveal');
        });
        const fb = document.createElement('div');
        fb.className = 'qz-feedback ' + (correct ? 'right' : 'wrong');
        fb.innerHTML = '<b>' + (correct ? 'Correct.' : 'Not quite.') + '</b> ' + q.exp;
        card.insertBefore(fb, submitBtn);
        const nextBtn = document.createElement('button');
        nextBtn.className = 'qz-next-btn';
        nextBtn.textContent = (session.pos + 1 < total) ? 'Next Question ›' : 'See Results ›';
        nextBtn.addEventListener('click', () => {
          session.pos++; session.answered = false; session.selected = null; session.optOrder = null;
          if (session.pos >= total) session.finished = true;
          renderBody();
        });
        card.appendChild(nextBtn);
        submitBtn.remove();
        renderWeeks();
      });
    }
    card.appendChild(submitBtn);
    body.appendChild(card);
  }

  async function renderWeekResults(body) {
    const total = session.order.length;
    const pct = Math.round((session.score / total) * 100);
    const prevBest = bestScores[activeWeek];
    if (prevBest === undefined || pct > prevBest) { bestScores[activeWeek] = pct; await saveBest(); }
    let msg;
    if (pct >= 90) msg = "Strong work — you've got this domain down.";
    else if (pct >= 75) msg = "Solid. Review what you missed below and you're in good shape.";
    else if (pct >= 50) msg = "Halfway there. Drill the flashcards for this week again before retrying.";
    else msg = "This week needs more time before the real exam — that's exactly what this quiz is for.";
    const wrap = document.createElement('div');
    wrap.className = 'qz-results';
    wrap.innerHTML =
      '<div class="qz-score-big">' + session.score + '/' + total + '</div>' +
      '<div class="qz-score-label">' + pct + '% — Week ' + activeWeek + '</div>' +
      '<div class="qz-score-msg">' + msg + '</div>' +
      (bestScores[activeWeek] !== undefined ? '<div class="qz-best-row">Best score this week: ' + bestScores[activeWeek] + '%</div>' : '') +
      '<button class="qz-retake-btn">↻ Retake Week ' + activeWeek + '</button>';
    wrap.querySelector('button').addEventListener('click', () => { session = null; renderBody(); });
    if (session.missed.length) {
      const missedWrap = document.createElement('div');
      missedWrap.className = 'qz-missed';
      missedWrap.innerHTML = '<div class="qz-missed-title">Review — ' + session.missed.length + ' missed</div>';
      session.missed.forEach(m => {
        const item = document.createElement('div');
        item.className = 'qz-missed-item';
        item.innerHTML = '<b>' + m.q + '</b><br>Correct answer: ' + m.correctText;
        missedWrap.appendChild(item);
      });
      wrap.appendChild(missedWrap);
    }
    body.appendChild(wrap);
  }

  // ---------------- FULL EXAM MODE ----------------
  const EXAM_SECONDS = 90 * 60;

  function clearExamTimer() { if (examTimer) { clearInterval(examTimer); examTimer = null; } }

  function startFullExam() {
    const order = shuffle(FULL_EXAM.map(q => q.id));
    session = { type:'exam', order, pos: 0, answers: {}, finished: false, view: 'question', timeLeft: EXAM_SECONDS };
    clearExamTimer();
    examTimer = setInterval(() => {
      if (!session || session.finished) { clearExamTimer(); return; }
      session.timeLeft--;
      if (session.timeLeft <= 0) { session.timeLeft = 0; finishExam(); }
      else updateTimerDisplay();
    }, 1000);
    renderBody();
  }

  function updateTimerDisplay() {
    const el = self.querySelector('#qz-timer-val');
    if (!el || !session) return;
    const m = Math.floor(session.timeLeft / 60), s = session.timeLeft % 60;
    el.textContent = pad(m) + ':' + pad(s);
    el.parentElement.classList.toggle('low', session.timeLeft <= 300);
  }

  function finishExam() {
    clearExamTimer();
    session.finished = true;
    renderBody();
  }

  function renderExamBody(body) {
    if (!session) {
      const intro = document.createElement('div');
      intro.className = 'qz-intro';
      intro.innerHTML =
        '<div class="qz-intro-count">90 questions · 90 minutes</div>' +
        '<div class="qz-intro-detail">Weighted to match the real Core 1 (220-1201) objective breakdown. No feedback until you submit — just like the real thing. You can navigate freely and review before submitting.</div>' +
        '<div class="qz-domainkey">' + DOMAINS.map(d => '<div class="qz-domainkey-row"><span>' + d + '</span><b>' + DOMAIN_PCT[d] + '%</b></div>').join('') + '</div>' +
        '<button class="qz-start-btn" style="margin-top:18px;">▶ Begin Exam</button>';
      intro.querySelector('button').addEventListener('click', startFullExam);
      body.appendChild(intro);
      return;
    }
    if (session.finished) { renderExamResults(body); return; }
    if (session.view === 'review') { renderExamReview(body); return; }

    const total = session.order.length;
    const q = FULL_EXAM.find(x => x.id === session.order[session.pos]);
    const answeredCount = Object.keys(session.answers).length;

    const progRow = document.createElement('div');
    progRow.className = 'qz-progressrow';
    progRow.innerHTML = '<span>QUESTION ' + (session.pos + 1) + ' OF ' + total + ' · ANSWERED ' + answeredCount + '</span><span class="qz-timer">⏱ <span id="qz-timer-val">--:--</span></span>';
    body.appendChild(progRow);
    updateTimerDisplay();
    const track = document.createElement('div');
    track.className = 'qz-progress-track';
    track.innerHTML = '<div class="qz-progress-fill" style="width:' + Math.round(((session.pos+1) / total) * 100) + '%"></div>';
    body.appendChild(track);

    const domTag = document.createElement('div');
    domTag.className = 'qz-domaintag';
    domTag.textContent = q.domain;
    body.appendChild(domTag);

    const card = document.createElement('div');
    card.className = 'qz-card';
    card.innerHTML = '<div class="qz-qtext">' + q.q + '</div>';
    const ul = document.createElement('ul');
    ul.className = 'qz-opts';
    const letters = ['A','B','C','D'];
    const savedAnswer = session.answers[q.id];
    q.opts.forEach((optText, idx) => {
      const li = document.createElement('li');
      li.className = 'qz-opt' + (savedAnswer === idx ? ' selected' : '');
      li.innerHTML = '<span class="qz-opt-letter">' + letters[idx] + '</span><span>' + optText + '</span>';
      li.addEventListener('click', () => {
        session.answers[q.id] = idx;
        ul.querySelectorAll('.qz-opt').forEach(el => el.classList.remove('selected'));
        li.classList.add('selected');
      });
      ul.appendChild(li);
    });
    card.appendChild(ul);
    body.appendChild(card);

    const navRow = document.createElement('div');
    navRow.className = 'qz-navrow';
    const prevBtn = document.createElement('button');
    prevBtn.className = 'qz-navbtn'; prevBtn.textContent = '‹ Prev'; prevBtn.disabled = session.pos === 0;
    prevBtn.addEventListener('click', () => { session.pos--; renderBody(); });
    const reviewBtn = document.createElement('button');
    reviewBtn.className = 'qz-navbtn'; reviewBtn.textContent = 'Review Grid';
    reviewBtn.addEventListener('click', () => { session.view = 'review'; renderBody(); });
    navRow.appendChild(prevBtn); navRow.appendChild(reviewBtn);
    if (session.pos + 1 < total) {
      const nextBtn = document.createElement('button');
      nextBtn.className = 'qz-navbtn'; nextBtn.textContent = 'Next ›';
      nextBtn.addEventListener('click', () => { session.pos++; renderBody(); });
      navRow.appendChild(nextBtn);
    } else {
      const submitBtn = document.createElement('button');
      submitBtn.className = 'qz-navbtn submit'; submitBtn.textContent = 'Submit Exam';
      submitBtn.addEventListener('click', () => {
        const unanswered = total - Object.keys(session.answers).length;
        if (unanswered > 0 && !confirm(unanswered + ' question(s) unanswered. Submit anyway?')) return;
        finishExam();
      });
      navRow.appendChild(submitBtn);
    }
    body.appendChild(navRow);
  }

  function renderExamReview(body) {
    const total = session.order.length;
    const title = document.createElement('div');
    title.className = 'qz-progressrow';
    title.innerHTML = '<span>REVIEW — ' + Object.keys(session.answers).length + ' OF ' + total + ' ANSWERED</span><span class="qz-timer">⏱ <span id="qz-timer-val">--:--</span></span>';
    body.appendChild(title);
    updateTimerDisplay();
    const grid = document.createElement('div');
    grid.className = 'qz-reviewgrid';
    session.order.forEach((qid, i) => {
      const btn = document.createElement('button');
      btn.className = 'qz-gridbtn' + (session.answers[qid] !== undefined ? ' answered' : '') + (i === session.pos ? ' current' : '');
      btn.textContent = i + 1;
      btn.addEventListener('click', () => { session.pos = i; session.view = 'question'; renderBody(); });
      grid.appendChild(btn);
    });
    body.appendChild(grid);
    const navRow = document.createElement('div');
    navRow.className = 'qz-navrow';
    const backBtn = document.createElement('button');
    backBtn.className = 'qz-navbtn'; backBtn.textContent = '‹ Back to Question';
    backBtn.addEventListener('click', () => { session.view = 'question'; renderBody(); });
    const submitBtn = document.createElement('button');
    submitBtn.className = 'qz-navbtn submit'; submitBtn.textContent = 'Submit Exam';
    submitBtn.addEventListener('click', () => {
      const unanswered = total - Object.keys(session.answers).length;
      if (unanswered > 0 && !confirm(unanswered + ' question(s) unanswered. Submit anyway?')) return;
      finishExam();
    });
    navRow.appendChild(backBtn); navRow.appendChild(submitBtn);
    body.appendChild(navRow);
  }

  async function renderExamResults(body) {
    const total = session.order.length;
    let score = 0;
    const byDomain = {};
    DOMAINS.forEach(d => byDomain[d] = { correct: 0, total: 0 });
    const missed = [];
    session.order.forEach(qid => {
      const q = FULL_EXAM.find(x => x.id === qid);
      byDomain[q.domain].total++;
      const ans = session.answers[qid];
      if (ans === q.correct) { score++; byDomain[q.domain].correct++; }
      else missed.push({ q: q.q, domain: q.domain, correctText: q.opts[q.correct], exp: q.exp });
    });
    const pct = Math.round((score / total) * 100);
    const passed = pct >= 75;

    if (bestExamScore === null || pct > bestExamScore) { bestExamScore = pct; await saveExamBest(); }

    const wrap = document.createElement('div');
    wrap.className = 'qz-results';
    wrap.innerHTML =
      '<div class="qz-score-big">' + score + '/' + total + '</div>' +
      '<div class="qz-score-label">' + pct + '%</div>' +
      '<div class="qz-passfail ' + (passed ? 'pass' : 'fail') + '">' + (passed ? 'PASS (practice)' : 'NOT YET PASSING') + '</div>' +
      '<div class="qz-disclaimer">Real CompTIA scoring uses a weighted 100–900 scale (passing ≈675, about 75%). This is a straight percentage for practice purposes only.</div>' +
      (bestExamScore !== null ? '<div class="qz-best-row" style="margin-top:14px;">Best full-exam score: ' + bestExamScore + '%</div>' : '') +
      '<button class="qz-retake-btn">↻ Retake Full Exam</button>';
    wrap.querySelector('button').addEventListener('click', () => { session = null; renderBody(); });

    const dbWrap = document.createElement('div');
    dbWrap.className = 'qz-domainbreak';
    dbWrap.innerHTML = '<div class="qz-domainbreak-title">Score by domain</div>';
    DOMAINS.forEach(d => {
      const stat = byDomain[d];
      const dpct = stat.total ? Math.round((stat.correct / stat.total) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'qz-dbrow';
      row.innerHTML = '<span class="qz-dbname">' + d + '</span><span class="qz-dbtrack"><span class="qz-dbfill ' + (dpct === 100 ? 'ok' : 'miss') + '" style="width:' + dpct + '%"></span></span><span class="qz-dbcount">' + stat.correct + '/' + stat.total + '</span>';
      dbWrap.appendChild(row);
    });
    wrap.appendChild(dbWrap);

    const weakDomains = DOMAINS.filter(d => byDomain[d].correct < byDomain[d].total);
    if (weakDomains.length) {
      const obj = document.createElement('div');
      obj.className = 'qz-objareas';
      obj.innerHTML = '<div class="qz-objareas-title">You answered one or more questions incorrectly in these objective areas:</div><ul>' +
        weakDomains.map(d => '<li>' + d + '</li>').join('') + '</ul>';
      wrap.appendChild(obj);
    }

    if (missed.length) {
      const missedWrap = document.createElement('div');
      missedWrap.className = 'qz-missed';
      missedWrap.innerHTML = '<div class="qz-missed-title">Review — ' + missed.length + ' missed</div>';
      missed.forEach(m => {
        const item = document.createElement('div');
        item.className = 'qz-missed-item';
        item.innerHTML = '<b>[' + m.domain + ']</b> ' + m.q + '<br>Correct answer: ' + m.correctText;
        missedWrap.appendChild(item);
      });
      wrap.appendChild(missedWrap);
    }
    body.appendChild(wrap);
  }

  function renderBody() {
    const body = self.querySelector('#qz-body');
    body.innerHTML = '';
    if (mode === 'week') renderWeekBody(body);
    else renderExamBody(body);
  }

  (async function init() {
    await loadBest();
    activeWeek = currentWeekByDate();
    renderAll();
  })();
})();
</script>
